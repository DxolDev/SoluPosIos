name: SoluPos
options:
  bundleIdPrefix: com.solupos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: "NO"
    ENABLE_PREVIEWS: "YES"

targets:
  SoluPos:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoluPos
        createIntermediateGroups: true
    info:
      path: SoluPos/Info.plist
      properties:
        CFBundleDisplayName: SoluPos
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Se usa para escanear códigos de barras."
        NSBluetoothAlwaysUsageDescription: "Se usa para conectar la impresora térmica PT-210."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solupos.contenedor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: SoluPos/SoluPos.entitlements
      properties:
        com.apple.developer.bluetooth-peripheral-manager-background-modes:
          - central
